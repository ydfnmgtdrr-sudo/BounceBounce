<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Sprungkraft Blueprint</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Manrope:wght@400;500;600;700;800&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0c0d11; --bg2:#101218; --surface:#16181f; --surface2:#1c1f28;
  --line:rgba(255,255,255,.07); --line2:rgba(255,255,255,.12);
  --text:#f3f4f7; --muted:#9aa1ad; --faint:#6b7280;
  --accent:#ff7a1a; --accent-soft:rgba(255,122,26,.14);
  --good:#34d399; --bad:#f87171;
  --m1:#34d399; --m2:#22d3ee; --m3:#60a5fa; --m4:#a78bfa; --m5:#fb923c; --m6:#fb5e7a;
  --f-disp:'Anton',Impact,'Arial Narrow',sans-serif;
  --f-cond:'Barlow Condensed',system-ui,sans-serif;
  --f-body:'Manrope',system-ui,-apple-system,Segoe UI,sans-serif;
  --shadow:0 12px 34px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:var(--f-body); color:var(--text); background:var(--bg);
  background-image:
    radial-gradient(1200px 540px at 85% -8%, rgba(255,122,26,.13), transparent 60%),
    radial-gradient(900px 480px at -10% 8%, rgba(96,165,250,.10), transparent 55%);
  background-attachment:fixed;
  -webkit-font-smoothing:antialiased; line-height:1.5; letter-spacing:.005em;
}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.04;
  background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
#app{position:relative;z-index:1;max-width:468px;margin:0 auto;min-height:100vh;
  display:flex;flex-direction:column;
  border-left:1px solid var(--line);border-right:1px solid var(--line);
  background:linear-gradient(180deg,rgba(255,255,255,.012),transparent 240px);}

/* App bar */
.appbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:11px;
  padding:14px 18px 13px;backdrop-filter:blur(16px);
  background:linear-gradient(180deg,rgba(12,13,17,.92),rgba(12,13,17,.66));
  border-bottom:1px solid var(--line);}
.logo{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;
  background:radial-gradient(circle at 30% 25%,#ffb066,var(--accent));
  box-shadow:0 6px 16px rgba(255,122,26,.4), inset 0 1px 0 rgba(255,255,255,.35);}
.brand h1{font-family:var(--f-disp);font-size:21px;letter-spacing:.045em;line-height:.95;margin:0;
  text-transform:uppercase;}
.brand p{margin:1px 0 0;font-size:10.5px;color:var(--muted);letter-spacing:.16em;text-transform:uppercase;font-weight:700}
.appbar .wk{margin-left:auto;text-align:right}
.appbar .wk b{font-family:var(--f-disp);font-size:18px;letter-spacing:.03em;display:block;line-height:1}
.appbar .wk span{font-size:9.5px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;font-weight:700}

main{flex:1;padding:18px 16px 104px;animation:fade .34s ease both}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes pop{0%{transform:scale(.7)}60%{transform:scale(1.12)}100%{transform:scale(1)}}

/* Bottom nav */
.tabbar{position:fixed;left:50%;transform:translateX(-50%);bottom:0;z-index:40;width:100%;max-width:468px;
  display:grid;grid-template-columns:repeat(5,1fr);
  background:linear-gradient(180deg,rgba(16,18,24,.82),rgba(10,11,15,.96));
  backdrop-filter:blur(18px);border-top:1px solid var(--line2);
  padding:8px 6px calc(8px + env(safe-area-inset-bottom));}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;border:0;background:none;cursor:pointer;
  color:var(--faint);font-family:var(--f-body);font-size:9.5px;font-weight:700;letter-spacing:.05em;
  padding:5px 2px;border-radius:12px;transition:color .18s,transform .12s;text-transform:uppercase}
.tab svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.tab.active{color:var(--accent)}
.tab.active svg{filter:drop-shadow(0 0 7px rgba(255,122,26,.6))}
.tab:active{transform:scale(.9)}

/* Generic */
.section-eyebrow{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);font-weight:800;margin:0 2px 9px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden}
.stagger>*{animation:fade .4s ease both}
.stagger>*:nth-child(1){animation-delay:.02s}.stagger>*:nth-child(2){animation-delay:.07s}
.stagger>*:nth-child(3){animation-delay:.12s}.stagger>*:nth-child(4){animation-delay:.17s}
.stagger>*:nth-child(5){animation-delay:.22s}.stagger>*:nth-child(6){animation-delay:.27s}
.stagger>*:nth-child(7){animation-delay:.32s}.stagger>*:nth-child(n+8){animation-delay:.36s}

/* HERO (home) */
.hero{position:relative;border-radius:22px;padding:22px 20px 20px;margin-bottom:18px;overflow:hidden;
  background:
    radial-gradient(420px 200px at 90% -10%,rgba(255,122,26,.32),transparent 60%),
    linear-gradient(160deg,#1a1d27,#121319);
  border:1px solid var(--line2);box-shadow:var(--shadow)}
.hero .court{position:absolute;right:-30px;top:-26px;font-size:128px;opacity:.06;transform:rotate(-12deg)}
.hero h2{font-family:var(--f-disp);font-size:30px;line-height:.92;letter-spacing:.02em;margin:0;text-transform:uppercase}
.hero .sub{color:#ffcf9f;font-weight:700;font-size:12px;letter-spacing:.1em;text-transform:uppercase;margin-top:8px}
.hero .meta{display:flex;gap:18px;margin-top:16px}
.hero .meta .v{font-family:var(--f-disp);font-size:26px;line-height:1;letter-spacing:.02em}
.hero .meta .k{font-size:9.5px;color:var(--muted);letter-spacing:.13em;text-transform:uppercase;font-weight:700;margin-top:3px}

.timeline{display:flex;gap:5px;margin-top:18px}
.timeline .seg{flex:1;height:8px;border-radius:6px;opacity:.55;transition:.2s}
.timeline .seg.on{opacity:1;box-shadow:0 0 12px -1px currentColor;height:11px}
.tl-labels{display:flex;justify-content:space-between;margin-top:6px;font-size:9px;color:var(--faint);font-weight:700;letter-spacing:.04em}

.statgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px;margin-bottom:18px}
.stat{padding:15px 14px;text-align:left}
.stat .v{font-family:var(--f-disp);font-size:27px;line-height:.95;letter-spacing:.02em}
.stat .v small{font-family:var(--f-body);font-size:12px;color:var(--muted);font-weight:700;letter-spacing:0}
.stat .k{font-size:9.5px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-weight:700;margin-top:6px}
.stat .accent{color:var(--accent)}

.block-card{padding:17px 17px 16px;margin-bottom:14px;position:relative}
.block-card .tag{display:inline-flex;align-items:center;gap:7px;font-family:var(--f-disp);font-size:13px;letter-spacing:.05em;
  padding:5px 11px;border-radius:9px;color:#0c0d11;margin-bottom:11px}
.block-card h3{margin:0;font-size:17px;font-weight:800;letter-spacing:.01em}
.block-card .ph{color:var(--muted);font-size:12.5px;margin-top:5px}
.dateline{display:flex;align-items:center;gap:9px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
input[type=date],input[type=number],input[type=text]{
  font-family:var(--f-body);background:var(--surface2);border:1px solid var(--line2);color:var(--text);
  border-radius:10px;padding:9px 11px;font-size:13.5px;outline:none;transition:border .15s,box-shadow .15s;width:100%}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input::placeholder{color:var(--faint)}
.btn{font-family:var(--f-cond);text-transform:uppercase;letter-spacing:.07em;font-weight:700;font-size:15px;
  border:0;border-radius:12px;padding:12px 16px;cursor:pointer;transition:transform .12s,filter .15s;
  background:linear-gradient(135deg,#ffa45e,var(--accent));color:#1a0e03;width:100%;
  box-shadow:0 8px 20px rgba(255,122,26,.35)}
.btn:active{transform:scale(.97)}
.btn.ghost{background:var(--surface2);color:var(--text);border:1px solid var(--line2);box-shadow:none}

/* Mesocycle list */
.meso-card{padding:0;margin-bottom:13px;cursor:pointer;display:block;width:100%;text-align:left;border:1px solid var(--line);
  background:var(--surface);transition:transform .14s,border-color .2s}
.meso-card:active{transform:scale(.985)}
.meso-card .bar{height:5px;width:100%}
.meso-card .body{padding:15px 16px 15px;display:flex;gap:14px;align-items:flex-start}
.meso-badge{font-family:var(--f-disp);font-size:22px;letter-spacing:.02em;width:52px;height:52px;border-radius:13px;
  display:grid;place-items:center;flex:none;color:#0c0d11}
.meso-card h3{margin:0;font-size:15.5px;font-weight:800;letter-spacing:.01em}
.meso-card .wk{font-size:10.5px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-top:2px}
.meso-card .desc{font-size:12px;color:var(--muted);margin-top:7px;line-height:1.45}
.chiprow{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.chip{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 8px;border-radius:7px;
  background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--muted)}
.intens{margin-left:auto;text-align:right;flex:none}
.intens .v{font-family:var(--f-disp);font-size:15px;letter-spacing:.02em;color:var(--text)}
.intens .k{font-size:8.5px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;font-weight:700}

/* Meso detail */
.detail-head{position:relative;border-radius:20px;padding:18px 18px 17px;margin-bottom:15px;overflow:hidden;
  border:1px solid var(--line2);box-shadow:var(--shadow)}
.back{display:inline-flex;align-items:center;gap:6px;background:none;border:0;color:var(--muted);cursor:pointer;
  font-weight:700;font-size:12.5px;letter-spacing:.04em;padding:0;margin-bottom:13px}
.back svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.detail-head .code{font-family:var(--f-disp);font-size:34px;line-height:.9;letter-spacing:.02em}
.detail-head h2{margin:5px 0 0;font-size:16px;font-weight:800}
.detail-head .wk{font-size:10.5px;font-weight:800;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);margin-top:7px}
.keynote{margin-top:12px;padding:11px 13px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);
  font-size:12px;color:var(--text);line-height:1.5}
.keynote b{color:var(--accent2,inherit)}

.segctl{display:flex;gap:6px;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:5px;margin-bottom:13px}
.segctl button{flex:1;border:0;background:none;cursor:pointer;color:var(--muted);font-family:var(--f-cond);font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;font-size:14px;padding:9px 4px;border-radius:9px;transition:.16s}
.segctl button.on{color:#0c0d11;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.weekctl{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:15px}
.weekctl button{border:1px solid var(--line);background:var(--surface);cursor:pointer;border-radius:12px;padding:9px 4px;
  color:var(--muted);font-weight:800;font-size:13px;letter-spacing:.04em;transition:.16s;position:relative}
.weekctl button small{display:block;font-size:8.5px;letter-spacing:.1em;font-weight:700;margin-top:2px;color:var(--faint)}
.weekctl button.on{color:#0c0d11}
.weekctl button.on small{color:rgba(0,0,0,.6)}

.prog{display:flex;align-items:center;gap:11px;margin-bottom:14px;padding:0 2px}
.prog .track{flex:1;height:8px;border-radius:6px;background:var(--surface2);overflow:hidden;border:1px solid var(--line)}
.prog .fill{height:100%;border-radius:6px;transition:width .4s cubic-bezier(.2,.8,.2,1)}
.prog .lbl{font-family:var(--f-disp);font-size:14px;letter-spacing:.02em;min-width:46px;text-align:right}

.daytitle{font-family:var(--f-cond);text-transform:uppercase;letter-spacing:.05em;font-weight:700;font-size:15px;
  color:var(--muted);margin:0 2px 11px;display:flex;align-items:center;gap:8px}

/* Exercise card */
.ex{padding:14px 15px 13px;margin-bottom:11px;border-left:4px solid var(--cat,#888)}
.ex.contrast{margin-top:-5px;margin-left:14px;border-left-style:dashed;background:var(--bg2)}
.ex .top{display:flex;align-items:flex-start;gap:10px}
.ex h4{margin:0;font-size:14.5px;font-weight:800;letter-spacing:.005em;line-height:1.25;flex:1}
.cat-pill{font-size:9px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;padding:3px 7px;border-radius:6px;
  color:var(--cat,#aaa);background:color-mix(in srgb,var(--cat,#888) 16%,transparent);flex:none;white-space:nowrap}
.ex .targets{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.tg{display:flex;flex-direction:column;gap:1px;background:var(--surface2);border:1px solid var(--line);border-radius:10px;
  padding:7px 10px;min-width:56px}
.tg .k{font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);font-weight:700}
.tg .v{font-family:var(--f-disp);font-size:16px;letter-spacing:.01em;line-height:1}
.tg.kg .v{color:var(--accent)}
.tg .v small{font-family:var(--f-body);font-size:10px;color:var(--muted);font-weight:600}
.cues{font-size:11.5px;color:var(--muted);line-height:1.45;margin-top:10px}
.cues b{color:#ffcf9f;font-weight:700}
.sets{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px;align-items:center}
.setbox{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--line2);background:var(--surface2);cursor:pointer;
  font-family:var(--f-disp);font-size:13px;color:var(--muted);display:grid;place-items:center;transition:.14s;letter-spacing:.02em}
.setbox.done{background:var(--cat,var(--accent));border-color:transparent;color:#0c0d11;animation:pop .26s ease}
.logtoggle{margin-left:auto;background:none;border:1px solid var(--line2);color:var(--muted);border-radius:9px;
  padding:6px 11px;cursor:pointer;font-weight:700;font-size:11px;letter-spacing:.03em;display:inline-flex;gap:5px;align-items:center}
.logtoggle svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round}
.set-log-panel{display:none;margin-top:10px;padding:11px 12px;border-radius:12px;background:var(--surface2);border:1px solid var(--line2);animation:fade .2s ease}
.set-log-panel.open{display:block}
.set-log-panel .slp-header{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.set-log-panel .slp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.set-log-panel label{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:3px;display:block}
.set-log-panel input{padding:8px 6px;font-size:14px;font-family:var(--f-disp);letter-spacing:.02em;text-align:center;width:100%}
.setbox.active-log{box-shadow:0 0 0 2px var(--cat,var(--accent));color:var(--text)}

.deload-note{margin-top:6px;padding:13px 15px;border-radius:14px;border:1px solid rgba(248,113,113,.3);
  background:rgba(248,113,113,.07);color:#fca5a5;font-size:12px;font-weight:600;line-height:1.5;display:flex;gap:9px}

/* 1RM table */
.rm-intro{padding:15px 16px;margin-bottom:14px}
.rm-intro p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.5}
.rm-row{padding:13px 14px;margin-bottom:9px}
.rm-row .head{display:flex;align-items:center;gap:11px}
.rm-row .nm{font-weight:800;font-size:14px;flex:1}
.rm-row .inp{display:flex;align-items:center;gap:7px}
.rm-row .inp input{width:78px;text-align:center;font-family:var(--f-disp);font-size:17px;letter-spacing:.02em;padding:7px}
.rm-row .inp span{font-size:11px;color:var(--muted);font-weight:700}
.pcts{display:flex;gap:6px;overflow-x:auto;margin-top:11px;padding-bottom:3px;-webkit-overflow-scrolling:touch}
.pcts::-webkit-scrollbar{height:5px}.pcts::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}
.pc{flex:none;text-align:center;background:var(--surface2);border:1px solid var(--line);border-radius:9px;padding:6px 9px;min-width:48px}
.pc .p{font-size:8.5px;color:var(--faint);font-weight:800;letter-spacing:.06em}
.pc .w{font-family:var(--f-disp);font-size:15px;letter-spacing:.01em;margin-top:1px}
.pc.hot{border-color:var(--accent);background:var(--accent-soft)}
.pc.hot .w{color:var(--accent)}
.tip{padding:13px 15px;border-radius:13px;background:rgba(255,122,26,.07);border:1px solid rgba(255,122,26,.22);
  color:#ffcf9f;font-size:11.5px;line-height:1.5;display:flex;gap:9px;margin-top:4px}

/* Jump tracker */
.jump-row{padding:14px 15px;margin-bottom:11px}
.jump-row .rh{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:11px}
.jump-row .rh .lab{font-weight:800;font-size:13.5px}
.jump-row .rh .ms{font-size:9.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#0c0d11;
  padding:3px 8px;border-radius:7px}
.jgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.jgrid.dates{grid-template-columns:1fr;margin-bottom:8px}
.jfield label{font-size:8.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700;margin-bottom:4px;display:block}
.jfield input{text-align:center;padding:8px 6px;font-size:14px;font-family:var(--f-disp);letter-spacing:.02em}
.jfield.note input{font-family:var(--f-body);font-size:12px;text-align:left}
.jdelta{display:flex;gap:14px;margin-top:11px;padding-top:11px;border-top:1px dashed var(--line2)}
.jdelta .d{font-size:9px;letter-spacing:.09em;text-transform:uppercase;color:var(--faint);font-weight:700}
.jdelta .d b{display:block;font-family:var(--f-disp);font-size:16px;letter-spacing:.02em;margin-top:2px;color:var(--text)}
.jdelta .d b.up{color:var(--good)} .jdelta .d b.dn{color:var(--bad)}
.chart-card{padding:16px 14px 12px;margin-bottom:16px}
.legend{display:flex;gap:16px;justify-content:center;margin-top:8px;font-size:10.5px;font-weight:700;color:var(--muted)}
.legend i{display:inline-block;width:11px;height:3px;border-radius:2px;margin-right:5px;vertical-align:middle}

/* Guide */
.gp{padding:15px 16px;margin-bottom:11px;border-left:4px solid var(--accent)}
.gp h4{margin:0 0 6px;font-size:14.5px;font-weight:800}
.gp p{margin:0;font-size:12.5px;color:var(--muted);line-height:1.55}
.gp .num{font-family:var(--f-disp);font-size:13px;color:var(--accent);margin-right:7px}
.proto{padding:16px 17px;margin:16px 0 14px;border:1px solid rgba(248,113,113,.28);background:rgba(248,113,113,.05)}
.proto h3{font-family:var(--f-disp);font-size:16px;letter-spacing:.04em;color:#fca5a5;margin:0 0 12px;text-transform:uppercase}
.proto li{font-size:12px;color:#f3f4f7;line-height:1.5;margin-bottom:9px;list-style:none;padding-left:24px;position:relative}
.proto li::before{content:"⚠";position:absolute;left:0;top:0;font-size:12px}
.ov-tbl{margin-top:6px}
.ov-row{padding:14px 15px;margin-bottom:10px;border-left:4px solid var(--cat)}
.ov-row .h{display:flex;align-items:center;gap:10px}
.ov-row .bd{font-family:var(--f-disp);width:38px;height:38px;border-radius:10px;display:grid;place-items:center;
  font-size:17px;color:#0c0d11;flex:none}
.ov-row .ttl{font-weight:800;font-size:13.5px}
.ov-row .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;margin-top:11px}
.ov-row .meta div{font-size:11px}
.ov-row .meta .k{color:var(--faint);font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-size:8.5px}
.ov-row .meta .v{color:var(--text);margin-top:1px}
.foot{text-align:center;color:var(--faint);font-size:10.5px;letter-spacing:.05em;padding:18px 10px 4px;line-height:1.6}

async function loadKey(k,fb){
  // Prefer localStorage (works on any host, e.g. GitHub Pages). Fall back to Claude artifact storage if present.
  if(hasLocalStore){
    try{ const raw=window.localStorage.getItem(k); if(raw!=null) return JSON.parse(raw); }catch(e){}
  }
  if(hasClaudeStore){
    try{const r=await window.storage.get(k); return (r&&r.value!=null)?JSON.parse(r.value):fb;}catch(e){return fb;}
  }
  return fb;
}
const savers={};
function saveKey(k,v){
  if(hasLocalStore){ try{ window.localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
  if(hasClaudeStore){ clearTimeout(savers[k]); savers[k]=setTimeout(async()=>{ try{await window.storage.set(k,JSON.stringify(v));}catch(e){} },280); }
}

  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
function importBackupFile(file){
  const reader=new FileReader();
  reader.onload=async ()=>{
    try{
      const payload=JSON.parse(reader.result);
      if(payload.vb_onerm) DB.onerm=payload.vb_onerm;
      if(payload.vb_training){ DB.training=payload.vb_training; if(!DB.training.done)DB.training.done={}; if(!DB.training.log)DB.training.log={}; }
      if(payload.vb_jump) DB.jump=payload.vb_jump;
      if(payload.vb_settings) DB.settings=payload.vb_settings;
      saveKey('vb_onerm',DB.onerm); saveKey('vb_training',DB.training); saveKey('vb_jump',DB.jump); saveKey('vb_settings',DB.settings);
      alert('Backup erfolgreich importiert!');
      render();
    }catch(e){ alert('Import fehlgeschlagen — Datei konnte nicht gelesen werden.'); }
  };
  reader.readAsText(file);
}

async function boot(){
  // If this device/browser has never stored training data before, seed it once from the embedded backup (2026-06-26),
  // so switching to a new app version doesn't start you from zero. Once any real data exists, the seed is never used again.
  let alreadyHasData=false;
  if(hasLocalStore){ try{ alreadyHasData = window.localStorage.getItem('vb_training')!=null; }catch(e){} }
  if(!alreadyHasData && hasClaudeStore){ try{ const r=await window.storage.get('vb_training'); alreadyHasData = !!(r&&r.value!=null); }catch(e){} }
  if(!alreadyHasData && typeof SEED_BACKUP!=='undefined'){
    DB.onerm=SEED_BACKUP.vb_onerm||DB.onerm;
    DB.training=SEED_BACKUP.vb_training||DB.training;
    DB.jump=SEED_BACKUP.vb_jump||DB.jump;
    DB.settings=SEED_BACKUP.vb_settings||DB.settings;
    saveKey('vb_onerm',DB.onerm); saveKey('vb_training',DB.training); saveKey('vb_jump',DB.jump); saveKey('vb_settings',DB.settings);
  }
  DB.onerm    = await loadKey('vb_onerm', DB.onerm);
  DB.training = await loadKey('vb_training', DB.training);
  DB.jump     = await loadKey('vb_jump', DB.jump);
  DB.settings = await loadKey('vb_settings', DB.settings);
  if(!DB.training.done) DB.training.done={}; if(!DB.training.log) DB.training.log={};
  buildTabs(); render();
}

/* ---------- helpers ---------- */
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function emph(s){ return esc(s).replace(/(OPTIONAL|Kontrast|Deload|DELOAD|frisch|Technik ist König|niemals|IMMER|Pflicht|PR!|supramaximal|105%)/g,'<b>$1</b>'); }
const round0=x=>Math.round(x);
function targetKg(calc){ if(!calc) return null; const m=DB.onerm[calc.lift]; if(!m) return null; return round0(m*calc.pct); }
function currentProgram(){
  const sd=DB.settings.startDate; if(!sd) return null;
  const start=new Date(sd+'T00:00:00'); if(isNaN(start)) return null;
  const days=Math.floor((Date.now()-start)/864e5); if(days<0) return {wk:0,meso:0,wkIn:0,pre:true};
  const wk=Math.min(days/7|0,23); return {wk, meso:(wk/4|0), wkIn:wk%4, days};
}

function drawChart(){
  const cv=document.getElementById('jchart'); if(!cv)return;
  const ctx=cv.getContext('2d'); const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
  const padL=30,padR=12,padT=14,padB=22;
  const series=[['squat','#ff7a1a'],['approach','#60a5fa'],['block','#34d399']];
  let vals=[]; DB.jump.forEach(r=>series.forEach(([k])=>{const v=parseFloat(r[k]); if(!isNaN(v))vals.push(v);}));
  if(vals.length<1){ ctx.fillStyle='#6b7280';ctx.font='600 13px Manrope,sans-serif';ctx.textAlign='center';
    ctx.fillText('Trage Sprungwerte ein, um den Verlauf zu sehen',W/2,H/2); return; }
  let mn=Math.min(...vals),mx=Math.max(...vals); if(mn===mx){mn-=5;mx+=5;} const rng=mx-mn||1; mn=Math.floor((mn-2)); mx=Math.ceil(mx+2);
  const n=DATA.jump.rows.length;
  const X=i=> padL + (W-padL-padR)*(n<2?0.5:i/(n-1));
  const Y=v=> padT + (H-padT-padB)*(1-(v-mn)/(mx-mn));
  // grid
  ctx.strokeStyle='rgba(255,255,255,.07)';ctx.lineWidth=1; ctx.fillStyle='#6b7280';ctx.font='600 9px Manrope,sans-serif';ctx.textAlign='right';
  for(let g=0;g<=3;g++){ const val=mn+(mx-mn)*g/3; const y=Y(val); ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke(); ctx.fillText(Math.round(val),padL-5,y+3); }
  series.forEach(([k,col])=>{
    const pts=[]; DB.jump.forEach((r,i)=>{const v=parseFloat(r[k]); if(!isNaN(v))pts.push([i,v]);});
    if(pts.length>=2){ ctx.strokeStyle=col;ctx.lineWidth=2.4;ctx.lineJoin='round';ctx.beginPath();
      pts.forEach((p,j)=>{const x=X(p[0]),y=Y(p[1]); j?ctx.lineTo(x,y):ctx.moveTo(x,y);}); ctx.stroke(); }
    pts.forEach(p=>{const x=X(p[0]),y=Y(p[1]); ctx.fillStyle=col;ctx.beginPath();ctx.arc(x,y,3.6,0,7);ctx.fill();
      ctx.fillStyle='#0c0d11';ctx.beginPath();ctx.arc(x,y,1.5,0,7);ctx.fill();});
  });
}

/* ---------- GUIDE ---------- */
function viewGuide(){
  const princ=DATA.principles.map((p,i)=>{
    const t=p.title.replace(/^\d+\.\s*/,'');
    return `<div class="card gp"><h4><span class="num">${String(i+1).padStart(2,'0')}</span>${esc(t)}</h4><p>${esc(p.body)}</p></div>`;
  }).join('');
  const proto=`<div class="card proto"><h3>${esc(DATA.antiBlowup_title||'Anti Blowup Protocol')}</h3><ul style="margin:0;padding:0">${
    DATA.antiBlowup.map(x=>`<li>${esc(x.replace(/^\d+\.\s*/,''))}</li>`).join('')}</ul></div>`;
  const ov=DATA.overview.rows.map((r,i)=>`<div class="ov-row" style="--cat:${MESO_COLORS[i]}">
      <div class="h"><div class="bd" style="background:${MESO_COLORS[i]}">${i+1}</div>
        <div><div class="ttl">${esc(r[3])}</div><div class="wk" style="font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.1em;text-transform:uppercase">${esc(r[1])}</div></div></div>
      <div class="meta">
        <div><div class="k">Methode</div><div class="v">${esc(r[4])}</div></div>
        <div><div class="k">Intensität</div><div class="v">${esc(r[7])} %1RM · RPE ${esc(r[10])}</div></div>
        <div><div class="k">Plyometrie</div><div class="v">${esc(r[11])}</div></div>
        <div><div class="k">THP</div><div class="v">${esc(r[12])}</div></div>
      </div></div>`).join('');
  return `<div class="section-eyebrow">Die 10 Prinzipien</div><div class="stagger">${princ}</div>
    ${proto}
    <div class="section-eyebrow" style="margin-top:18px">Makrozyklus-Übersicht</div>
    <div class="ov-tbl">${ov}</div>
    <div class="foot">John Evans / THP Strength Methodik</div>`;
}

/* ---------- events ---------- */
document.getElementById('tabbar').addEventListener('click',e=>{
  const b=e.target.closest('[data-nav]'); if(!b)return;
  S.view=b.dataset.nav; if(S.view==='training'){/*keep meso selection*/} render();
});
document.getElementById('screen').addEventListener('click',e=>{
  const nav=e.target.closest('[data-nav]'); if(nav){S.view=nav.dataset.nav; render(); return;}
  const om=e.target.closest('[data-openmeso]'); if(om){ S.view='training'; S.mesoIdx=+om.dataset.openmeso; S.dayIdx=0;
    S.week = om.dataset.week!=null? +om.dataset.week : S.week; render(); return; }
  const bk=e.target.closest('[data-back]'); if(bk){ S.mesoIdx=null; render(); return; }
  const dy=e.target.closest('[data-day]'); if(dy){ S.dayIdx=+dy.dataset.day; render(); return; }
  const wk=e.target.closest('[data-week]'); if(wk && wk.closest('.weekctl')){ S.week=+wk.dataset.week; render(); return; }
  const set=e.target.closest('[data-set]'); if(set){ const [xi,s]=set.dataset.set.split(':').map(Number);
    const k=key(S.mesoIdx,S.dayIdx,S.week,xi,s); const now=!DB.training.done[k];
    if(now)DB.training.done[k]=true; else delete DB.training.done[k];
    saveKey('vb_training',DB.training);
    const col=MESO_COLORS[S.mesoIdx];
    set.classList.toggle('done',now); set.style.background = now?col:'';
    // toggle log panel for this set
    const panel=document.getElementById(`slp-${xi}-${s}`);
    if(panel){
      const isOpen=panel.classList.contains('open');
      // close all panels in this exercise first
      set.closest('.sets').querySelectorAll('.set-log-panel').forEach(p=>p.classList.remove('open'));
      set.closest('.sets').querySelectorAll('.setbox').forEach(b=>b.classList.remove('active-log'));
      if(!isOpen){ panel.classList.add('open'); set.classList.add('active-log');
        setTimeout(()=>{ const inp=panel.querySelector('input'); if(inp)inp.focus(); },50); }
    }
    updateDayProgress(col); return; }
  const lg=e.target.closest('[data-log]'); if(lg){ const el=document.getElementById('lb-'+lg.dataset.log); if(el)el.classList.toggle('open'); return; }
  const rs=e.target.closest('[data-reset]'); if(rs){ DATA.tracker.lifts.forEach(l=>DB.onerm[l.key]=100); saveKey('vb_onerm',DB.onerm); render(); return; }
  const bexp=e.target.closest('[data-backup-export]'); if(bexp){ exportBackup(); return; }
  const bimp=e.target.closest('[data-backup-import-trigger]'); if(bimp){ const inp=document.getElementById('backup-file-input'); if(inp)inp.click(); return; }
});
document.getElementById('screen').addEventListener('input',e=>{
  const t=e.target;
  if(t.dataset.rm){ DB.onerm[t.dataset.rm]=parseFloat(t.value)||0; saveKey('vb_onerm',DB.onerm);
    // live update just this row's pcts
    const row=t.closest('.rm-row'); const v=DB.onerm[t.dataset.rm];
    row.querySelectorAll('.pc').forEach((pc,idx)=>{ const p=DATA.tracker.percents[idx].value; pc.querySelector('.w').textContent=v?round0(v*p):'–';});
    return;
  }
  if(t.dataset.startdate!==undefined){ DB.settings.startDate=t.value; saveKey('vb_settings',DB.settings); updateWkBadge(); return; }
  if(t.dataset.j){ const [i,f]=t.dataset.j.split(':'); DB.jump[i]=DB.jump[i]||{}; DB.jump[i][f]=t.value; saveKey('vb_jump',DB.jump);
    if(f!=='date'&&f!=='notes'){ // recompute deltas + chart without full rerender focus loss
      drawChart(); refreshJumpDeltas(); }
    return; }
  if(t.dataset.li){ const [xi,si,f]=t.dataset.li.split(':'); const k=key(S.mesoIdx,S.dayIdx,S.week,xi,si);
    DB.training.log[k]=DB.training.log[k]||{}; DB.training.log[k][f]=t.value; saveKey('vb_training',DB.training); return; }
  if(t.dataset.lij){ const [xi,si,f]=t.dataset.lij.split(':'); const k=key(S.mesoIdx,S.dayIdx,S.week,xi,si);
    DB.training.log[k]=DB.training.log[k]||{}; DB.training.log[k][f]=t.value; saveKey('vb_training',DB.training);
    // auto-sync best cm value of this exercise into the jump tracker row for this meso
    const day=DATA.mesos[S.mesoIdx].days[S.dayIdx]; const ex=day.exercises[xi];
    let best=null;
    for(let s=0;s<ex.sets;s++){ const v=parseFloat((DB.training.log[key(S.mesoIdx,S.dayIdx,S.week,xi,s)]||{}).cm); if(!isNaN(v) && (best===null||v>best)) best=v; }
    if(best!=null){
      const rowIdx=S.mesoIdx+1; // row 0 = Baseline, row mesoIdx+1 = "Ende Meso X"
      const field = /anlauf|approach/i.test(ex.name) ? 'approach' : 'squat';
      DB.jump[rowIdx]=DB.jump[rowIdx]||{}; DB.jump[rowIdx][field]=String(best);
      if(!DB.jump[rowIdx].date) DB.jump[rowIdx].date=new Date().toISOString().slice(0,10);
      saveKey('vb_jump',DB.jump); drawChart(); refreshJumpDeltas();
    }
    return; }
});
document.getElementById('screen').addEventListener('change',e=>{
  if(e.target.dataset.startdate!==undefined){ render(); } // refresh home block after date chosen
  if(e.target.id==='backup-file-input' && e.target.files && e.target.files[0]){ importBackupFile(e.target.files[0]); e.target.value=''; }
});
function updateDayProgress(col){
  if(S.mesoIdx==null)return; const day=DATA.mesos[S.mesoIdx].days[S.dayIdx];
  let total=0,done=0;
  day.exercises.forEach((ex,xi)=>{ const effSets=(ex.weekOverride && ex.weekOverride[S.week] && ex.weekOverride[S.week].sets!=null)?ex.weekOverride[S.week].sets:ex.sets; for(let s=0;s<effSets;s++){ total++; if(DB.training.done[key(S.mesoIdx,S.dayIdx,S.week,xi,s)])done++; } });
  const pct=total?Math.round(done/total*100):0;
  const f=document.getElementById('progfill'); if(f)f.style.width=pct+'%';
  const l=document.getElementById('proglbl'); if(l)l.textContent=pct+'%';
  const ft=document.getElementById('dayfoot'); if(ft)ft.textContent=`${done}/${total} Sätze in dieser Woche erledigt`;
}
function refreshJumpDeltas(){
  const base=parseFloat(DB.jump[0]&&DB.jump[0].squat); let best=-Infinity;
  const rows=document.querySelectorAll('.jump-row');
  DB.jump.forEach((r,i)=>{ const sq=parseFloat(r.squat); if(!isNaN(sq)&&sq>best)best=sq;
    const card=rows[i]; if(!card)return; const dEls=card.querySelectorAll('.jdelta b');
    if(dEls.length){ if(i>0&&!isNaN(base)&&!isNaN(sq)){const d=sq-base; dEls[0].textContent=(d>0?'+':'')+d+' cm'; dEls[0].className=d>0?'up':(d<0?'dn':'');}
      else if(dEls[0]){dEls[0].textContent='–';dEls[0].className='';}
      if(dEls[1])dEls[1].textContent=(best>-Infinity?best+' cm':'–'); }
  });
}

boot();
</script>
